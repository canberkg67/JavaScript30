<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Array Cardio 💪💪</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body>
  <p><em>Psst: have a look at the JavaScript Console</em> 💁</p>
  <script>
    // ## Array Cardio Day 2

    const people = [
      { name: 'Wes', year: 1988 },
      { name: 'Kait', year: 1986 },
      { name: 'Irv', year: 1970 },
      { name: 'Lux', year: 2015 }
    ];

    const comments = [
      { text: 'Love this!', id: 523423 },
      { text: 'Super good', id: 823423 },
      { text: 'You are the best', id: 2039842 },
      { text: 'Ramen is my fav food ever', id: 123523 },
      { text: 'Nice Nice Nice!', id: 542328 }
    ];

    // Some and Every Checks
    // 1- Array.prototype.some() // is at least one person 19 or older?
    const isAdult = people.some(function(person) {
      const currentYear = (new Date()).getFullYear(); //mevcut yılı alır
      if (currentYear - person.year >= 19) {
        return true;
      }
    });

      console.log({isAdult}); //object basar. {isAdult: true}
      console.log(isAdult); //sadece true basar.

    // some() dizideki her bir indexi fonksiyona göre kontrol eder.
    // şartı sağlayan sadece bir tane olması da yeterli true döndürmek için.
    // some ilk true döndüğü anda durur;map ise tüm elemanlara fonksiyonu uygular.
    // map ve filter fonku uygulayarak yeni dizi döndürür;some ve every ise true-false döndürür.

    // 2- Array.prototype.every() // is everyone 19 or older?

    //every'de ise bütün elementler koşulu sağlamazsa false döner. bir tane yeterli değil.
    //yukarıdakinin arrow fonklu hali gibi yazalım.

    const allAdults = people.every(person => ((new Date()).getFullYear()) - person.year >= 19);
    console.log({allAdults});

    // 3-  Array.prototype.find()
    // Find is like filter, but instead returns just the one you are looking for
    // find the comment with the ID of 823423

    //find,bulduğu ilkini döndürür. birden fazla varsa bile ilki döner sadece.

    const wanted = comments.find(function(comment){
      if(comment.id === 823423){
        return true;
      }
    })

    console.log(wanted);

    // 4- Array.prototype.findIndex()
    // Find the comment with this ID
    // delete the comment with the ID of 823423

    //find,o id'ye sahip olan object'i döndürür.findIndex ise onun arraydaki eleman index'ini döndürür.0,1,2...
    //yoruma ulaşmak için find,yorumu silmek için findIndex kullan.

    const index = comments.findIndex(comment => comment.id === 823423);
    console.log(index);

    comments.splice(index,1);

    //array.splice(startIndex, deleteCount);
    //başlanılacak index ve silinecek eleman sayısı.


    //console.table diye bir şey var. hem array hem object ile çalışır.
    //onlar tablo halinde gösterir,düz satır yerine.

  </script>
</body>
</html>
